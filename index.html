<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasha Mobile</title>
    <style>
        body { background: #0a0a0c; color: #00ffcc; font-family: sans-serif; padding: 20px; }
        input { width: 100%; padding: 15px; margin-top: 10px; background: #121215; border: 1px solid #1f1f23; color: white; }
    </style>
</head>
<body>
    <h3>PASHA MOBILE HUB</h3>
    <input type="text" id="userInput" placeholder="Ask Pasha...">
    <button onclick="send()">SEND</button>
    <div id="output"></div>

    <script>
        async function send() {
            let msg = document.getElementById('userInput').value;
            let res = await fetch('https://confident-emotional-dependence-dallas.trycloudflare.com/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await res.json();
            document.getElementById('output').innerText = data.reply;
        }
    </script>
</body>
</html>
