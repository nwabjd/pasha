<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasha Quantum Engine</title>
    <style>
        :root {
            --bg-color: #060609;
            --glass-bg: rgba(18, 18, 24, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f5ff;
            --neon-magenta: #e0115f;
            --neon-purple: #9d4edd;
            --text-main: #e2e8f0;
            --text-dim: #747d8c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 78, 221, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.12) 0%, transparent 45%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Responsive Layout Grid */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            width: 100%;
            height: 100vh;
        }

        /* 1. GLASS SIDEBAR */
        .sidebar {
            background: rgba(10, 10, 14, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .logo-section h2 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .nav-item button {
            width: 100%;
            padding: 14px 18px;
            background: transparent;
            border: none;
            border-radius: 14px;
            color: var(--text-dim);
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active button, .nav-item button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* 2. MAIN DASHBOARD REGION */
        .main-viewport {
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Glassmorphic Panel Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .quantum-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
        }

        .quantum-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* AI Core Centerpiece Illusion */
        .core-sphere-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .quantum-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--neon-cyan) 0%, var(--neon-purple) 60%, var(--neon-magenta) 100%);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.4), inset -10px -10px 30px rgba(0,0,0,0.6);
            filter: blur(0.5px);
            animation: pulseOrb 4s infinite ease-in-out;
        }

        @keyframes pulseOrb {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(157, 78, 221, 0.4); }
            50% { transform: scale(1.06); box-shadow: 0 0 65px rgba(0, 245, 255, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 40px rgba(157, 78, 221, 0.4); }
        }

        /* Input Glass Controls */
        .command-bar {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 8px 12px;
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        .command-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            padding-left: 10px;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--neon-magenta), var(--neon-purple));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(224, 17, 95, 0.3);
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        /* Mobile Adjustments */
        @media(max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main-viewport { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 1. NAVIGATION -->
        <aside class="sidebar">
            <div class="logo-section">
                <h2>PASHA OS</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active"><button>CORE HUB</button></li>
                <li class="nav-item"><button>ANALYTICS</button></li>
                <li class="nav-item"><button>PREDICTIONS</button></li>
                <li class="nav-item"><button>SECURITY</button></li>
                <li class="nav-item"><button>SETTINGS</button></li>
            </ul>
        </aside>

        <!-- 2. DATA VIEWPORT -->
        <main class="main-viewport">
            <header class="header-status">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Quantum Workspace</h1>
                </div>
                <div style="color: var(--neon-cyan); font-weight: 700; font-size: 0.9rem;">
                    ● UPLINK SECURE
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- AI Engine Panel -->
                <div class="quantum-card">
                    <div class="card-title">AI Core Topology</div>
                    <div class="core-sphere-wrapper">
                        <div class="quantum-orb"></div>
                    </div>
                </div>

                <!-- Status Summary Panel -->
                <div class="quantum-card">
                    <div class="card-title">System Metrics</div>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-dim);">CORE EFFICIENCY</div>
                            <div style="font-size: 1.8rem; font-weight: 300; color: var(--neon-cyan);">99.8%</div>
                        </div>
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-dim);">RESPONSE LATENCY</div>
                            <div style="font-size: 1.8rem; font-weight: 300; color: var(--text-main);">0.001s</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Interaction Pane -->
            <div class="quantum-card" style="flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px;">
                <div class="card-title">Console Output</div>
                <div style="color: var(--text-dim); font-family: monospace; font-size: 0.9rem; flex: 1;">
                    [SYSTEM] Quantum Engine Initialized. Awaiting directives...
                </div>
                <div class="command-bar">
                    <input type="text" class="command-input" placeholder="Transmit instruction code...">
                    <button class="action-btn">EXECUTE</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
